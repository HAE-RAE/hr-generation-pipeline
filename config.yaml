project:
  name: "Reasoning Model Evaluation"
  experiment_name: "reasoning_eval_v2_advanced"

database:
  type: "sqlite"
  path: "./tasks.db"

dataset:
  # Inline records follow the standard question/gold/category schema
  records:
    - question: "What is 2+2?\nA. 3\nB. 4\nC. 5\nD. 6"
      gold: "B"
      category: "mcqa"
    - question: "Solve 5 * 3."
      gold: "15"
      category: "math"

models:
  - name: "tiny-gpt2"
    path: "sshleifer/tiny-gpt2"

generation_worker:
  replicas: 1
  backend: "transformers"  # "transformers" or "vllm"
  vllm_engine_params:
    tensor_parallel_size: 1
    # dtype: "auto"   # optional
  sampling_params:
    temperature: 0.2
    max_tokens: 64
  reasoning_prompting:
    strategy: "append"     # "append" or "prepend"
    on_text: "Let's think step by step."
    off_text: ""
  reasoning_control_param:
    name: "enable_reasoning"
    on_value: true
    off_value: false

evaluation_worker:
  replicas: 1
  evaluations_to_run:
    - "mcqa"
    - "math_verify"
    - "llm_judge_comparative"
    - "llm_judge_individual"
  comparative_judge:
    model: "gpt-4-turbo"
    prompt_template_path: "./prompts/comparative_judge_template.yaml"
  individual_judge:
    model: "gpt-4-turbo"
    rubric_path: "./prompts/general_rubric.yaml"

logging:
  level: "INFO"
  dir: "./results/logs"
