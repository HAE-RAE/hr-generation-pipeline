project:
  name: "Reasoning Model Evaluation"
  experiment_name: "reasoning_eval_v2_advanced"

database:
  type: "sqlite"
  path: "./tasks.db"

dataset:
  # You can provide inline prompts for quick tests (takes precedence over name/file)
  prompts:
    - "Compare reasoning vs base: What is 2+2?"
    - "Write a short plan to cook pasta."
  # name: "imdb"
  # prompt_column: "text"
  # split: "test[:5]"
  sample_size: 2

models:
  - name: "tiny-gpt2"
    path: "sshleifer/tiny-gpt2"

generation_worker:
  replicas: 1
  backend: "transformers"  # "transformers" or "vllm"
  vllm_engine_params:
    tensor_parallel_size: 1
    # dtype: "auto"   # optional
  sampling_params:
    temperature: 0.2
    max_tokens: 64
  reasoning_prompting:
    strategy: "append"     # "append" or "prepend"
    on_text: "Let's think step by step."
    off_text: ""
  reasoning_control_param:
    name: "enable_reasoning"
    on_value: true
    off_value: false

evaluation_worker:
  replicas: 1
  judge_model:
    type: "openai"
    name: "gpt-4-turbo"
  judge_prompt_template_path: "./prompts/judge_template.yaml"
  rubric_path: "./prompts/general_rubric.yaml"
  choice_logic:
    method: "higher_score"

logging:
  level: "INFO"
  dir: "./results/logs"
